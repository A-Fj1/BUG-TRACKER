<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BugTracker Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #000000;
  --surface: #0a0a0a;
  --surface2: #111111;
  --border: #1e1e1e;
  --accent: #4f8cff;
  --accent2: #7c6fff;
  --danger: #ff4f6d;
  --success: #3ecf8e;
  --warning: #f5a623;
  --text: #60a5fa;
  --muted: #93c5fd;
  --high: #ff4f6d;
  --medium: #f5a623;
  --low: #3ecf8e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 230px;
  min-height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
}
.logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
}
.logo h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: #60a5fa !important;
}
.logo span {
  font-size: 11px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
nav { padding: 16px 0; flex: 1; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  cursor: pointer;
  color: var(--muted);
  font-size: 14px;
  font-weight: 400;
  transition: all 0.2s;
  border-left: 3px solid transparent;
  user-select: none;
}
.nav-item:hover { color: var(--text); background: var(--surface2); }
.nav-item.active {
  color: var(--accent);
  background: rgba(79,140,255,0.08);
  border-left-color: var(--accent);
}
.nav-icon { font-size: 16px; width: 20px; text-align: center; }
.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
}

/* ── MAIN ── */
.main {
  margin-left: 230px;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}
.topbar {
  padding: 16px 32px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  font-weight: 500;
}
.btn {
  padding: 8px 18px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.2s;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: #3a7aff; transform: translateY(-1px); }
.btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
.btn-danger:hover { background: rgba(255,79,109,0.1); }
.btn-edit { background: transparent; color: var(--accent); border: 1px solid var(--border); }
.btn-edit:hover { border-color: var(--accent); }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* ── CONTENT ── */
.content {
  padding: 32px;
  flex: 1;
}
.page { display: none; }
.page.active { display: block; }

/* ── STATS ROW ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  transition: border-color 0.2s;
}
.stat-card:hover { border-color: var(--accent); }
.stat-num {
  font-family: 'Orbitron', sans-serif;
  font-size: 36px;
  font-weight: 600;
  line-height: 1;
  color: var(--accent);
}
.stat-label {
  font-size: 12px;
  color: var(--muted);
  margin-top: 6px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* ── TABLE ── */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.table-header {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.table-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 500;
}
table { width: 100%; border-collapse: collapse; }
th {
  padding: 10px 16px;
  text-align: left;
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}
td {
  padding: 12px 16px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }
.actions { display: flex; gap: 6px; }

/* ── BADGES ── */
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  font-family: 'JetBrains Mono', monospace;
}
.badge-high { background: rgba(255,79,109,0.15); color: var(--high); }
.badge-medium { background: rgba(245,166,35,0.15); color: var(--warning); }
.badge-low { background: rgba(62,207,142,0.15); color: var(--success); }
.badge-open { background: rgba(79,140,255,0.15); color: var(--accent); }
.badge-closed { background: rgba(107,114,128,0.15); color: var(--muted); }
.badge-active { background: rgba(62,207,142,0.15); color: var(--success); }
.badge-pending { background: rgba(245,166,35,0.15); color: var(--warning); }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  width: 480px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
  animation: modalIn 0.2s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.modal h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  margin-bottom: 20px;
}
.form-group { margin-bottom: 16px; }
label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
input, select, textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 12px;
  border-radius: 6px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 70px; }
select option { background: var(--surface2); }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.btn-cancel { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-cancel:hover { color: var(--text); border-color: var(--muted); }

/* ── LOADING / EMPTY ── */
.loading { text-align: center; padding: 48px; color: var(--muted); font-size: 14px; }
.empty { text-align: center; padding: 48px; color: var(--muted); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 28px; right: 28px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 20px;
  font-size: 13px;
  z-index: 9999;
  transform: translateY(20px);
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: var(--success); color: var(--success); }
.toast.error { border-color: var(--danger); color: var(--danger); }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <div style="display:flex;flex-direction:column;align-items:center;text-align:center;">
      <img src="/static/logo.jpg" alt="logo" style="width:52px;height:52px;object-fit:cover;border-radius:8px;margin-bottom:8px;">
      <h1 style="color:#60a5fa;">BUG TRACKER</h1>
    </div>
  </div>
  <nav>
    <div class="nav-item active" onclick="showPage('dashboard')">
      <span class="nav-icon">◈</span> Dashboard
    </div>
    <div class="nav-item" onclick="showPage('users')">
      <span class="nav-icon">◉</span> Users
    </div>
    <div class="nav-item" onclick="showPage('teams')">
      <span class="nav-icon">◎</span> Teams
    </div>
    <div class="nav-item" onclick="showPage('projects')">
      <span class="nav-icon">▣</span> Projects
    </div>
    <div class="nav-item" onclick="showPage('issues')">
      <span class="nav-icon">⚑</span> Issues
    </div>
    <div class="nav-item" onclick="showPage('comments')">
      <span class="nav-icon">◇</span> Comments
    </div>
  </nav>
  <div class="sidebar-footer">© 2026 — All rights reserved.</div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="page-title">Dashboard</div>
    <button class="btn btn-primary" id="add-btn" onclick="openAddModal()" style="display:none">+ Add New</button>
  </div>
  <div class="content">

    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
      <div class="stats-row" id="stats-row">
        <div class="loading">Loading stats…</div>
      </div>
    </div>

    <!-- USERS -->
    <div class="page" id="page-users">
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title">All Users</div>
        </div>
        <div id="users-table"><div class="loading">Loading…</div></div>
      </div>
    </div>

    <!-- TEAMS -->
    <div class="page" id="page-teams">
      <div class="table-wrap">
        <div class="table-header"><div class="table-title">All Teams</div></div>
        <div id="teams-table"><div class="loading">Loading…</div></div>
      </div>
    </div>

    <!-- PROJECTS -->
    <div class="page" id="page-projects">
      <div class="table-wrap">
        <div class="table-header"><div class="table-title">All Projects</div></div>
        <div id="projects-table"><div class="loading">Loading…</div></div>
      </div>
    </div>

    <!-- ISSUES -->
    <div class="page" id="page-issues">
      <div class="table-wrap">
        <div class="table-header"><div class="table-title">All Issues</div></div>
        <div id="issues-table"><div class="loading">Loading…</div></div>
      </div>
    </div>

    <!-- COMMENTS -->
    <div class="page" id="page-comments">
      <div class="table-wrap">
        <div class="table-header"><div class="table-title">All Comments</div></div>
        <div id="comments-table"><div class="loading">Loading…</div></div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <h2 id="modal-title">Add Record</h2>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const API = '/api';
let currentPage = 'dashboard';
let editingId = null;
let modalMode = null;

// ── NAV ──────────────────────────────────────────────────
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => {
    if (n.textContent.toLowerCase().includes(page)) n.classList.add('active');
  });
  document.getElementById('page-title').textContent =
    page.charAt(0).toUpperCase() + page.slice(1);
  document.getElementById('add-btn').style.display = page === 'dashboard' ? 'none' : '';
  currentPage = page;
  loadPage(page);
}

function loadPage(page) {
  if (page === 'dashboard') loadStats();
  else if (page === 'users') loadUsers();
  else if (page === 'teams') loadTeams();
  else if (page === 'projects') loadProjects();
  else if (page === 'issues') loadIssues();
  else if (page === 'comments') loadComments();
}

// ── TOAST ─────────────────────────────────────────────────
function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 2800);
}

// ── BADGE HELPERS ─────────────────────────────────────────
function badgePriority(p) {
  const m = {'High':'high','Medium':'medium','Low':'low'};
  return `<span class="badge badge-${m[p]||'low'}">${p||'-'}</span>`;
}
function badgeStatus(s) {
  const m = {'Open':'open','Closed':'closed','Active':'active','Pending':'pending'};
  return `<span class="badge badge-${m[s]||'open'}">${s||'-'}</span>`;
}

// ── STATS ─────────────────────────────────────────────────
async function loadStats() {
  const stats = await fetch(API+'/stats').then(r=>r.json()).catch(()=>null);
  if (!stats) { document.getElementById('stats-row').innerHTML = '<div class="loading">Could not connect to server.</div>'; return; }
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-num">${stats.users}</div><div class="stat-label">Users</div></div>
    <div class="stat-card"><div class="stat-num">${stats.teams}</div><div class="stat-label">Teams</div></div>
    <div class="stat-card"><div class="stat-num">${stats.projects}</div><div class="stat-label">Projects</div></div>
    <div class="stat-card"><div class="stat-num">${stats.issues}</div><div class="stat-label">Total Issues</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${stats.open_issues}</div><div class="stat-label">Open Issues</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--danger)">${stats.high_priority}</div><div class="stat-label">High Priority</div></div>
  `;
}

// ── USERS ─────────────────────────────────────────────────
async function loadUsers() {
  const data = await fetch(API+'/users').then(r=>r.json()).catch(()=>[]);
  document.getElementById('users-table').innerHTML = data.length ? `
    <table>
      <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Actions</th></tr></thead>
      <tbody>${data.map(u=>`
        <tr>
          <td><code>${u.User_ID||u.user_id}</code></td>
          <td>${u.Name||u.name}</td>
          <td>${u.Email||u.email}</td>
          <td>${u.Role||u.role}</td>
          <td class="actions">
            <button class="btn btn-edit btn-sm" onclick='openEditModal("users",${JSON.stringify(u)})'>Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteRecord('users',${u.User_ID||u.user_id})">Delete</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>` : '<div class="empty">No users found.</div>';
}

// ── TEAMS ─────────────────────────────────────────────────
async function loadTeams() {
  const data = await fetch(API+'/teams').then(r=>r.json()).catch(()=>[]);
  document.getElementById('teams-table').innerHTML = data.length ? `
    <table>
      <thead><tr><th>ID</th><th>Team Name</th><th>Actions</th></tr></thead>
      <tbody>${data.map(t=>`
        <tr>
          <td><code>${t.team_id}</code></td>
          <td>${t.team_name}</td>
          <td class="actions">
            <button class="btn btn-edit btn-sm" onclick='openEditModal("teams",${JSON.stringify(t)})'>Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteRecord('teams',${t.team_id})">Delete</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>` : '<div class="empty">No teams found.</div>';
}

// ── PROJECTS ──────────────────────────────────────────────
async function loadProjects() {
  const data = await fetch(API+'/projects').then(r=>r.json()).catch(()=>[]);
  document.getElementById('projects-table').innerHTML = data.length ? `
    <table>
      <thead><tr><th>ID</th><th>Name</th><th>Description</th><th>Status</th><th>Team</th><th>End Date</th><th>Actions</th></tr></thead>
      <tbody>${data.map(p=>`
        <tr>
          <td><code>${p.project_id}</code></td>
          <td>${p.project_name}</td>
          <td style="color:var(--muted)">${p.description||'-'}</td>
          <td>${badgeStatus(p.project_status)}</td>
          <td>${p.team_name||'-'}</td>
          <td>${p.end_date||'-'}</td>
          <td class="actions">
            <button class="btn btn-edit btn-sm" onclick='openEditModal("projects",${JSON.stringify(p)})'>Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteRecord('projects',${p.project_id})">Delete</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>` : '<div class="empty">No projects found.</div>';
}

// ── ISSUES ────────────────────────────────────────────────
async function loadIssues() {
  const data = await fetch(API+'/issues').then(r=>r.json()).catch(()=>[]);
  document.getElementById('issues-table').innerHTML = data.length ? `
    <table>
      <thead><tr><th>ID</th><th>Title</th><th>Priority</th><th>Type</th><th>Status</th><th>Project</th><th>Assigned</th><th>Due</th><th>Actions</th></tr></thead>
      <tbody>${data.map(i=>`
        <tr>
          <td><code>${i.issue_id}</code></td>
          <td>${i.title}</td>
          <td>${badgePriority(i.priority)}</td>
          <td>${i.issue_type||'-'}</td>
          <td>${badgeStatus(i.status)}</td>
          <td>${i.project_name||'-'}</td>
          <td>${i.assigned_to||'-'}</td>
          <td>${i.due_date||'-'}</td>
          <td class="actions">
            <button class="btn btn-edit btn-sm" onclick='openEditModal("issues",${JSON.stringify(i)})'>Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteRecord('issues',${i.issue_id})">Delete</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>` : '<div class="empty">No issues found.</div>';
}

// ── COMMENTS ──────────────────────────────────────────────
async function loadComments() {
  const data = await fetch(API+'/comments').then(r=>r.json()).catch(()=>[]);
  document.getElementById('comments-table').innerHTML = data.length ? `
    <table>
      <thead><tr><th>ID</th><th>Content</th><th>User</th><th>Issue</th><th>Date</th><th>Actions</th></tr></thead>
      <tbody>${data.map(c=>`
        <tr>
          <td><code>${c.comment_id}</code></td>
          <td>${c.content}</td>
          <td>${c.user_name||'-'}</td>
          <td>${c.issue_title||'-'}</td>
          <td>${c.date_posted||'-'}</td>
          <td class="actions">
            <button class="btn btn-danger btn-sm" onclick="deleteRecord('comments',${c.comment_id})">Delete</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>` : '<div class="empty">No comments found.</div>';
}

// ── MODAL ─────────────────────────────────────────────────
const FORMS = {
  users: (d={}) => `
    <div class="form-group"><label>Name</label><input id="f-name" value="${d.name||''}"></div>
    <div class="form-group"><label>Email</label><input id="f-email" type="email" value="${d.email||''}"></div>
    <div class="form-group"><label>Role</label>
      <select id="f-role">
        ${['Developer','Tester','Manager','Admin'].map(r=>`<option ${d.role===r?'selected':''}>${r}</option>`).join('')}
      </select>
    </div>`,
  teams: (d={}) => `
    <div class="form-group"><label>Team Name</label><input id="f-team_name" value="${d.team_name||''}"></div>`,
  projects: (d={}) => `
    <div class="form-group"><label>Project Name</label><input id="f-project_name" value="${d.project_name||''}"></div>
    <div class="form-group"><label>Description</label><textarea id="f-description">${d.description||''}</textarea></div>
    <div class="form-group"><label>Start Date</label><input id="f-start_date" type="date" value="${d.start_date||''}"></div>
    <div class="form-group"><label>End Date</label><input id="f-end_date" type="date" value="${d.end_date||''}"></div>
    <div class="form-group"><label>Status</label>
      <select id="f-project_status">
        ${['Active','Pending','Completed'].map(s=>`<option ${d.project_status===s?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label>Team ID</label><input id="f-team_id" type="number" value="${d.team_id||''}"></div>`,
  issues: (d={}) => `
    <div class="form-group"><label>Title</label><input id="f-title" value="${d.title||''}"></div>
    <div class="form-group"><label>Description</label><textarea id="f-description">${d.description||''}</textarea></div>
    <div class="form-group"><label>Priority</label>
      <select id="f-priority">
        ${['High','Medium','Low'].map(p=>`<option ${d.priority===p?'selected':''}>${p}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label>Issue Type</label>
      <select id="f-issue_type">
        ${['Bug','Task','Incident','Feature'].map(t=>`<option ${d.issue_type===t?'selected':''}>${t}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label>Status</label>
      <select id="f-status">
        ${['Open','Closed','In Progress'].map(s=>`<option ${d.status===s?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label>Due Date</label><input id="f-due_date" type="date" value="${d.due_date||''}"></div>
    <div class="form-group"><label>Project ID</label><input id="f-project_id" type="number" value="${d.project_id||''}"></div>
    <div class="form-group"><label>User ID (Assigned)</label><input id="f-user_id" type="number" value="${d.user_id||''}"></div>`,
  comments: (d={}) => `
    <div class="form-group"><label>Content</label><textarea id="f-content">${d.content||''}</textarea></div>
    <div class="form-group"><label>User ID</label><input id="f-user_id" type="number" value="${d.user_id||''}"></div>
    <div class="form-group"><label>Issue ID</label><input id="f-issue_id" type="number" value="${d.issue_id||''}"></div>`,
};

function openAddModal() {
  editingId = null;
  modalMode = 'add';
  document.getElementById('modal-title').textContent = 'Add ' + currentPage.slice(0,-1);
  document.getElementById('modal-body').innerHTML = FORMS[currentPage]();
  document.getElementById('modal-overlay').classList.add('open');
}

function openEditModal(table, data) {
  editingId = data[table.slice(0,-1)+'_id'] || data[Object.keys(data)[0]];
  // figure out PK
  const pkMap = {users:'user_id',teams:'team_id',projects:'project_id',issues:'issue_id',comments:'comment_id'};
  editingId = data[pkMap[table]];
  modalMode = 'edit';
  currentPage = table;
  document.getElementById('modal-title').textContent = 'Edit ' + table.slice(0,-1);
  document.getElementById('modal-body').innerHTML = FORMS[table](data);
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

function getFormData() {
  const data = {};
  document.querySelectorAll('#modal-body [id^="f-"]').forEach(el => {
    const key = el.id.replace('f-','');
    data[key] = el.value;
  });
  return data;
}

async function saveModal() {
  const data = getFormData();
  const pkMap = {users:'user_id',teams:'team_id',projects:'project_id',issues:'issue_id',comments:'comment_id'};
  try {
    let res;
    if (modalMode === 'add') {
      res = await fetch(`${API}/${currentPage}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
    } else {
      res = await fetch(`${API}/${currentPage}/${editingId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
    }
    if (res.ok) {
      document.getElementById('modal-overlay').classList.remove('open');
      toast(modalMode === 'add' ? 'Record added!' : 'Record updated!');
      loadPage(currentPage);
    } else {
      toast('Error saving record', 'error');
    }
  } catch(e) {
    toast('Connection error', 'error');
  }
}

async function deleteRecord(table, id) {
  if (!confirm('Delete this record?')) return;
  try {
    const res = await fetch(`${API}/${table}/${id}`, { method:'DELETE' });
    if (res.ok) { toast('Deleted!'); loadPage(table); }
    else toast('Error deleting', 'error');
  } catch(e) {
    toast('Connection error', 'error');
  }
}

// ── INIT ──────────────────────────────────────────────────
loadStats();
</script>
</body>
</html>
